<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Toolkit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container py-5">
    <h1 class="text-center mb-4">Cyber Toolkit</h1>

    <!-- Tabs -->
    <ul class="nav nav-tabs justify-content-center mb-4" id="toolTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="network-tab" data-bs-toggle="tab" data-bs-target="#network" type="button" role="tab">Network Scan</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="port-tab" data-bs-toggle="tab" data-bs-target="#port" type="button" role="tab">Port Scanner</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="dns-tab" data-bs-toggle="tab" data-bs-target="#dns" type="button" role="tab">DNS Lookup</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="about-tab" data-bs-toggle="tab" data-bs-target="#about" type="button" role="tab">About</button>
        </li>
    </ul>

    <!-- Tab content -->
    <div class="tab-content" id="toolTabsContent">
        <!-- Network Scan Tab -->
        <div class="tab-pane fade show active" id="network" role="tabpanel">
            <form method="POST">
                <button type="submit" class="btn btn-primary btn-lg">Run Scan</button>
            </form>

            {% if result %}
            <div class="mt-4 p-3 bg-white rounded shadow-sm">
                <h5>Scan Results:</h5>
                <pre>{{ result }}</pre>
            </div>
            {% endif %}
        </div>

        <!-- Port Scanner Tab -->
        <div class="tab-pane fade" id="port" role="tabpanel">
            <p class="mt-3">Port scanner functionality will go here.</p>
        </div>

        <!-- DNS Lookup Tab -->
        <div class="tab-pane fade" id="dns" role="tabpanel">
            <p class="mt-3">DNS lookup functionality will go here.</p>
        </div>

        <!-- About Tab -->
        <div class="tab-pane fade" id="about" role="tabpanel">
            <p class="mt-3">This is your personal cyber toolkit web app. Add more tools in other tabs!</p>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
